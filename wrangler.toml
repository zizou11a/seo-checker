name = "seo-checker"
main = "worker.js"
compatibility_date = "2024-01-01"

# ── متغيرات البيئة ──
[vars]
ALLOWED_ORIGIN = "https://zizou11a.github.io"  # غيّر هذا لدومينك

# ── KV Namespace للـ Rate Limiting ──
# أنشئه أولاً: wrangler kv:namespace create SEO_RL
# ثم انسخ الـ id هنا
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "PASTE_YOUR_KV_ID_HERE"

# للتطوير المحلي (preview)
# preview_id = "PASTE_YOUR_PREVIEW_KV_ID_HERE"

# ── Routes — اختياري إذا أردت دومين مخصص ──
# [[routes]]
# pattern = "api.yourdomain.com/*"
# zone_name = "yourdomain.com"
